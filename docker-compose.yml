version: '3.8'

services:
  fraud-api:
    build: .
    container_name: fraud-detection-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro  # Read-only model files
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  fraud-dashboard:
    build: .
    container_name: fraud-detection-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
      - API_URL=http://fraud-api:8000
    depends_on:
      - fraud-api
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped

networks:
  default:
    name: fraud-detection-network